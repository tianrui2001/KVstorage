syntax = "proto3";

package raftKVRpcProctoc; //所在命名空间

option cc_generic_services = true; //开启stub服务

// 日志实体
message GetArgs {
    bytes key = 1; // 键
    bytes ClientId = 2; // 客户端ID
    int32 RequestId = 3; // 请求ID
}

message GetReply {
    bytes Err = 1; // 错误信息
    bytes Value = 2; // 值
}

// Put or Append
message PutAppendArgs {
    bytes key = 1;
    bytes Value = 2;
    bytes Op = 3; // "Put" or "Append"
    bytes ClientId = 4; // 客户端ID
    int32 RequestId = 5; // 请求ID
}

message PutAppendReply {
    bytes Err = 1; // 错误信息
}

//只有raft节点之间才会涉及rpc通信
service kvServerRpc {
    rpc PutAppend(PutAppendArgs) returns(PutAppendReply);
    rpc Get(GetArgs) returns(GetReply);
}